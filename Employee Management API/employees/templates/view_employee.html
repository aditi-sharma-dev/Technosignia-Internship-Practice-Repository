<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>View Employees</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">


<style>

body{
    background: linear-gradient(135deg,#e3f2fd,#f8f9fa);
    min-height:100vh;
    font-family:Arial,sans-serif;
}


.main-card{

    background:white;
    border-radius:22px;
    padding:25px;
    margin-top:30px;
    box-shadow:0 10px 30px rgba(0,0,0,0.15);

}


.title{

    color:#0d6efd;
    font-weight:700;

}


.subtitle{

    color:#555;

}



.search-box{

    background:#f8f9fa;
    padding:15px;
    border-radius:15px;
    margin-bottom:20px;

}


.form-control{

    border-radius:10px;
    padding:10px;

}



.btn{

    border-radius:10px;
    font-weight:600;

}



.sort-area{

    margin-bottom:20px;

}


.table-responsive{

    border-radius:15px;
    overflow:hidden;

}



.table{

    margin-bottom:0;

}



.table th{

    text-align:center;
    vertical-align:middle;
    white-space:nowrap;

}



.table td{

    text-align:center;
    vertical-align:middle;

}



.table tbody tr:hover{

    background:#f1f7ff;
    transition:0.3s;

}



.action-btn{

    padding:4px 10px;
    font-size:13px;
    border-radius:7px;

}


.back-link{

    text-decoration:none;
    font-weight:600;

}


</style>

</head>


<body>


<div class="container">


<div class="main-card">


<h2 class="text-center title mb-1">
Employee Management System
</h2>


<h4 class="text-center subtitle mb-4">
Employee List
</h4>



<div class="search-box">


<div class="row align-items-center">


<div class="col-md-6 mb-2 mb-md-0">

<input type="text"
id="searchInput"
class="form-control"
placeholder="Search employee...">

</div>



<div class="col-md-3 mb-2 mb-md-0">

<button class="btn btn-primary w-100"
onclick="searchEmployee()">

Search

</button>

</div>



<div class="col-md-3">

<button class="btn btn-secondary w-100"
onclick="loadEmployees()">

Reset

</button>

</div>


</div>


</div>





<div class="sort-area">


<button class="btn btn-success btn-sm me-2"
onclick="sortAscending()">

Sort A-Z

</button>



<button class="btn btn-dark btn-sm"
onclick="sortDescending()">

Sort Z-A

</button>


</div>





<div class="table-responsive">


<table class="table table-bordered table-hover">


<thead class="table-dark">


<tr>

<th>Emp ID</th>
<th>Name</th>
<th>Email</th>
<th>Phone Number</th>
<th>City</th>
<th>Address</th>
<th>Department</th>
<th>Designation</th>
<th>Salary</th>
<th>Action</th>


</tr>


</thead>



<tbody id="employeeTable">

</tbody>



</table>


</div>




<form style="display:none;">

{% csrf_token %}

</form>



<p class="text-center mt-4 mb-0">


<a href="/employees/dashboard/" class="back-link">

← Back to Dashboard

</a>


</p>



</div>


</div>



<script>
    async function loadEmployees(){
    try{
        const response=await fetch("/employees/view/");
        const employees=await response.json();
        const table=document.getElementById("employeeTable")
        table.innerHTML="";
        employees.forEach(employee=>{
            table.innerHTML+=`
            <tr>
            <td>${employee.Emp_Id}</td>
            <td>${employee.Name}</td>
            <td>${employee.Email}</td>
            <td>${employee.Phone_No}</td>
            <td>${employee.City}</td>
            <td>${employee.Address}</td>
            <td>${employee.Department}</td>
            <td>${employee.Designation}</td>
            <td>${employee.Salary}</td>
            <td>
            <button class="btn btn-warning btn-sm me-1" onclick="editEmployee(${employee.Emp_Id})">
              Edit
            </button>

            <button class="btn btn-danger btn-sm" onclick="deleteEmployee(${employee.Emp_Id})">
              Delete
            </button>
            
            </td>



            </tr>
            `;
        });
    }catch(error){
        console.log(error);
        alert("Unable to load employee");
    }
}
loadEmployees();
function editEmployee(id){
   window.location.href=`/employees/update_employee_page/${id}/`;
}
async function deleteEmployee(id){
    if(!confirm("Are you sure you want to delete this employee?")){
        return;
    }
    try{
        const csrftoken=document.querySelector("[name=csrfmiddlewaretoken]").value;
        const response=await fetch(`/employees/delete/${id}/`,{
                 method:"DELETE",
                 headers:{
                 "X-CSRFToken":csrftoken 
                 }
        });
        const result=await response.json();
            if(response.ok){
            alert("Employee Deleted Successfully");
            loadEmployees();
        }
        else{
            alert(result.message);
        }

    }catch(error){
        console.log(error);
        alert("Something went wrong");
    }
}
async function searchEmployee(){
    const keyword=document.getElementById("searchInput").value.trim();
    if (keyword===""){
        loadEmployees();
        return;
    }
    try{
       let response=await fetch(`/employees/search-name/?name=${keyword}`);
       let employees=await response.json();
      if (employees.length===0){
        response=await fetch(`/employees/search-email/?email=${keyword}`);
        employees=await response.json();
      }
      if (employees.length===0){
        response=await fetch(`/employees/search-department/?department=${keyword}`);
        employees=await response.json();
      }
      if (employees.length===0){
        response=await fetch(`/employees/search-city/?city=${keyword}`);
        employees=await response.json();
      }
      const table=document.getElementById("employeeTable");
      table.innerHTML="";
        if (employees.length===0){
        table.innerHTML=`
        <tr>
        <td colspan="10" class="text-center text-danger">
          No Employee Found
        </td>
        </tr>
        `;
        return;
      }
      employees.forEach(employee=>{
        table.innerHTML+=`
        <tr>
        <td>${employee.Emp_Id}</td>
         <td>${employee.Name}</td>
        <td>${employee.Email}</td>
        <td>${employee.Phone_No}</td>
        <td>${employee.City}</td>
        <td>${employee.Address}</td>
        <td>${employee.Department}</td>
        <td>${employee.Designation}</td>
        <td>${employee.Salary}</td>
        <td>
          <button class="btn btn-warning btn-sm" onclick="editEmployee(${employee.Emp_Id})">Edit</button>
          <button class="btn btn-danger btn-sm" onclick="deleteEmployee(${employee.Emp_Id})">Delete</button>
        </td>
    </tr>
    `;
      });
    }catch(error){
        console.log(error);
        alert("Unable to search employee");
    }
    
}
function displayEmployees(employees) {

    const table = document.getElementById("employeeTable");
    table.innerHTML = "";

    if (employees.length === 0) {
        table.innerHTML = `
        <tr>
            <td colspan="10" class="text-center text-danger">
                No Employee Found
            </td>
        </tr>
        `;
        return;
    }

    employees.forEach(employee => {
        table.innerHTML += `
        <tr>
            <td>${employee.Emp_Id}</td>
            <td>${employee.Name}</td>
            <td>${employee.Email}</td>
            <td>${employee.Phone_No}</td>
            <td>${employee.City}</td>
            <td>${employee.Address}</td>
            <td>${employee.Department}</td>
            <td>${employee.Designation}</td>
            <td>${employee.Salary}</td>
            <td>
                <button class="btn btn-warning btn-sm" onclick="editEmployee(${employee.Emp_Id})">Edit</button>
                <button class="btn btn-danger btn-sm" onclick="deleteEmployee(${employee.Emp_Id})">Delete</button>
            </td>
        </tr>
        `;
    });

}
async function sortAscending(){
    try{
        const response=await fetch("/employees/sort-ascending/");
        const employees=await response.json();
        displayEmployees(employees)
    }catch(error){
        console.log(error)
        alert("Unable to sort employees")
    }
}
async function sortDescending(){
    try{
        const response=await fetch("/employees/sort-descending/");
        const employees=await response.json();
        displayEmployees(employees)
    }catch(error){
        console.log(error)
        alert("Unable to sort employees")
    }
}
</script>
</body>
</html>
