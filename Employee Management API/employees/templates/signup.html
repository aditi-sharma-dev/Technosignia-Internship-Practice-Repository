<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background: linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)),
                        url("/static/images/company.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }

        .card{
            max-width: 500px;
            margin: auto;
            border-radius: 15px;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="row justify-content-center align-items-center py-5">

        <div class="col-lg-5 col-md-6 col-sm-8 col-11">

            <div class="card border-0 shadow-lg p-3">

                <h3 class="text-center fw-bold mb-1">
                    Employee Management System
                </h3>


                <h5 class="text-center fw-semibold mb-3">
                    Register
                </h5>

                <form id="registerForm">

                    {% csrf_token %}

                    <div class="mb-2">
                        <label class="form-label fw-semibold">Name</label>
                        <input
                            type="text"
                            name="Name"
                            class="form-control"
                            placeholder="Enter your name">
                    </div>

                    <div class="mb-2">
                        <label class="form-label fw-semibold">Email</label>
                        <input
                            type="email"
                            name="Email"
                            class="form-control"
                            placeholder="Enter your email address">
                    </div>

                    <div class="mb-2">
                        <label class="form-label fw-semibold">Password</label>
                        <input
                            type="password"
                            name="Password"
                            class="form-control"
                            placeholder="Create a password">
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">
                            Confirm Password
                        </label>

                        <input
                            type="password"
                            name="ConfirmPassword"
                            class="form-control"
                            placeholder="Confirm your password">
                    </div>

                    <button
                        type="submit"
                        class="btn btn-primary w-100">
                        Register
                    </button>

                </form>

                <p class="text-center mt-3 mb-0">
                    Already have  an account?
                    <a href="{% url 'login_page' %}" class="text-decoration-none">
                        Sign In
                    </a>
                </p>

            </div>

        </div>

    </div>

</div>

<script>

const form = document.getElementById("registerForm");

form.addEventListener("submit", async function(event){

    event.preventDefault();

    if(form.Password.value !== form.ConfirmPassword.value){
        alert("Passwords do not match");
        return;
    }

    const EmployeeData = {
        Name: form.Name.value,
        Email: form.Email.value,
        Password: form.Password.value
    };

    try{

        const csrftoken = document.querySelector("[name=csrfmiddlewaretoken]").value;

        const response = await fetch("/employees/signup/",{
            method:"POST",
            headers:{
                "Content-Type":"application/json",
                "X-CSRFToken":csrftoken
            },
            body:JSON.stringify(EmployeeData)
        });

        const result = await response.json();

        if(response.ok){
            alert("Registration Successful");
            window.location.href="/employees/login-page/";
        }
        else{
            alert(JSON.stringify(result));
        }

    }
    catch(error){
        console.log(error);
        alert("Something went wrong");
    }

});

</script>

</body>
</html>
