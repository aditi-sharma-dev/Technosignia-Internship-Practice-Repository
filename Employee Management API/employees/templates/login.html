<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Login</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="row vh-100 justify-content-center align-items-center">
            <div class="col-md-5">
                <div class="card shadow p-4">
                    <h2 class="text-center mb-4">Employee Management System</h2>
                    <h5 class="text-center text-muted mb-4">Login</h5>
                <form id="loginForm">
                    {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" name="Email" class="form-control" placeholder="Enter your email">
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" name="Password" class="form-control" placeholder="Enter your password">
                </div>
                <button type="submit" class="btn btn-primary w-100">
                    Login
                </button>
                <p class="text-center mt-3">
                    Don't have an account?
                    <a href="{% url 'signup_page' %}">Register</a>
                </p>
             </form>
            </div>
            </div>
        </div>
    </div>
<script>
    const form=document.getElementById("loginForm")
    form.addEventListener("submit",async function(event){
        event.preventDefault();

        const LoginData={
            Email:form.Email.value,
            Password:form.Password.value
        };
        const csrftoken=document.querySelector("[name=csrfmiddlewaretoken]").value;
        try{
            const response=await fetch("/employees/login/",{
                method:"POST",
                headers:{
                    "Content-Type":"application/json",
                    "X-CSRFToken":csrftoken 

                },
                body:JSON.stringify(LoginData)
            });
            const result=await response.json()
            if (response.ok){
                alert(result.message);
                window.location.href="/employees/dashboard/";
            }else{
                alert(result.message)
            }
            }catch(error){
                alert("something went wrong");
                console.log(error);
            }

            });
      
</script>
</body>
</html>
