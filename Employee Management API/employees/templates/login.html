<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background: linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)),
                        url("/static/images/company.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }

        .card{
            max-width:430px;
            margin:auto;
            border:none;
            border-radius:15px;
            box-shadow:0 15px 35px rgba(0,0,0,.25);
        }

        .form-control{
            border-radius:8px;
            padding:10px;
        }

        .btn-primary{
            border-radius:8px;
            padding:10px;
            font-weight:600;
        }

        .form-control:focus{
            box-shadow:0 0 8px rgba(13,110,253,.25);
        }

        a{
            text-decoration:none;
        }
    </style>

</head>
<body>

<div class="container">
    <div class="row vh-100 justify-content-center align-items-center">

        <div class="col-lg-4 col-md-5 col-sm-8 col-11">

            <div class="card p-4">

                <h3 class="text-center fw-bold mb-2">
                    Employee Management System
                </h3>

                
                <h5 class="text-center fw-semibold mb-4">
                    Sign In
                </h5>

                <form id="loginForm">

                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Email</label>
                        <input type="email"
                               name="Email"
                               class="form-control"
                               placeholder="Enter your email address">
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold">Password</label>
                        <input type="password"
                               name="Password"
                               class="form-control"
                               placeholder="Enter your password">
                    </div>

                    <button type="submit" class="btn btn-primary w-100">
                        Sign In
                    </button>

                </form>

                <p class="text-center mt-4 mb-0">
                    Don't have an admin account?
                    <a href="{% url 'signup_page' %}">
                        Create Account
                    </a>
                </p>

            </div>

        </div>

    </div>
</div>

<script>
const form=document.getElementById("loginForm");

form.addEventListener("submit",async function(event){

    event.preventDefault();

    const LoginData={
        Email:form.Email.value,
        Password:form.Password.value
    };

    const csrftoken=document.querySelector("[name=csrfmiddlewaretoken]").value;

    try{

        const response=await fetch("/employees/login/",{
            method:"POST",
            headers:{
                "Content-Type":"application/json",
                "X-CSRFToken":csrftoken
            },
            body:JSON.stringify(LoginData)
        });

        const result=await response.json();

        if(response.ok){
            alert(result.message);
            window.location.href="/employees/dashboard/";
        }
        else{
            alert(result.message);
        }

    }
    catch(error){
        alert("Something went wrong");
        console.log(error);
    }

});
</script>

</body>
</html>
