<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Employee</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow p-4">
                    <h2 class="text-center mb-4">
                        Update Employee
                    </h2>
                    <form id="UpdateEmployeeForm">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">Name</label>
                            <input type="text" value="{{employee.Name}}" class="form-control" name="Name" placeholder="Enter Employee Name" required> 
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email"  class="form-control" name="Email" value="{{employee.Email}}" placeholder="Enter Email Id" required> 
                        </div>
                         <div class="mb-3">
                            <label class="form-label">Phone Number</label>
                            <input type="text"  class="form-control" value="{{employee.Phone_No}}" name="Phone_No" placeholder="Enter Phone Number" required> 
                        </div>
                        <div class="mb-3">
                            <label class="form-label">City</label>
                            <input type="text"  class="form-control" name="City" value="{{employee.City}}" placeholder="Enter City" required> 
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Address</label>
                            <textarea class="form-control" rows="3" name="Address" placeholder="Address" required>{{employee.Address}}</textarea> 
                        </div>
                         <div class="mb-3">
                            <label class="form-label">Department</label>
                            <input type="text"  class="form-control" name="Department" value="{{employee.Department}}" placeholder="Enter Department" required> 
                        </div>
                         <div class="mb-3">
                            <label class="form-label">Designation</label>
                            <input type="text"  class="form-control" name="Designation" value="{{employee.Designation}}"  placeholder="Enter Designation" required> 
                        </div>
                         <div class="mb-3">
                            <label class="form-label">Salary</label>
                            <input type="number"  class="form-control" name="Salary"  value="{{employee.Salary}}" placeholder="Enter Salary" required> 
                        </div>
                        <button type="submit" class="btn btn-success w-100">
                            Update  Employee
                        </button>

                    </form>
                </div>
            </div>
        </div>
    </div>
<script>
    const form=document.getElementById("UpdateEmployeeForm");
    const employeeId=window.location.pathname.split("/").filter(Boolean).pop();
    console.log(employeeId);
     form.addEventListener("submit", async function(event){
        event.preventDefault();
        const employeeData={
            Name:form.Name.value,
            Email:form.Email.value,
            Phone_No:form.Phone_No.value,
            City:form.City.value,
            Address:form.Address.value,
            Department:form.Department.value,
            Designation:form.Designation.value,
            Salary:form.Salary.value,
        };
        const csrftoken=document.querySelector("[name=csrfmiddlewaretoken]").value;
        try{
            const response=await fetch(`/employees/update/${employeeId}/`,{
                method:'PUT',
                headers:{
                    "Content-Type":"application/json",
                    "X-CSRFToken":csrftoken
                },
                body:JSON.stringify(employeeData)

            });
            const result=await response.json();
            if(response.ok){
                alert("Employee Update Successfully");
                window.location.href="/employees/view_employee_page/";
            }
            else{
                alert(JSON.stringify(result));
            }
        
        }catch(error){
            alert("something went wrong");
            console.log(error);
        }
       });
</script>
</body>
</html>
